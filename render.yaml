services:
  - type: web
    name: cadastro-eficiente
    env: python
    plan: starter
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cadastro-eficiente-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "cadastro-eficiente.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cadastro-eficiente.onrender.com"
      - key: MEDIA_ROOT
        value: "/var/data/media"
    disks:
      - name: media
        mountPath: /var/data
        sizeGB: 5

databases:
  - name: cadastro-eficiente-db
    plan: starter