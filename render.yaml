services:
  - type: web
    name: cadastro-eficiente
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn backend.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "cadastro-eficiente.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://cadastro-eficiente.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: cadastro-eficiente-db
          property: connectionString

databases:
  - name: cadastro-eficiente-db
    plan: free