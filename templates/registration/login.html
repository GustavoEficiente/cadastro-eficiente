{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto;">
    <h2>Entrar</h2>
    <form method="post">
        {% csrf_token %}
        <label>Usuário</label>
        <input type="text" name="username" class="form-control">

        <label>Senha</label>
        <input type="password" name="password" class="form-control">

        <button type="submit" class="btn">Entrar</button>
    </form>
</div>
{% endblock %}
